<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>OmniMaster Pro v3</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="app-shell">
      <aside class="sidebar">
        <div class="brand">Omni<span>Master</span></div>
        <nav class="menu">
          <div class="menu-item active" onclick="showTab('standard')">
            Standard Calc
          </div>
          <div class="menu-item" onclick="showTab('market')">
            Market & Grocery
          </div>
          <div class="menu-item" onclick="showTab('build')">
            Construction (Roof)
          </div>
          <div class="menu-item" onclick="showTab('age')">Age & Date Gap</div>
          <div class="menu-item" onclick="showTab('interest')">
            Interest (SI/CI)
          </div>
          <div class="menu-item" onclick="showTab('profit')">
            Profit & Target
          </div>
          <div class="menu-item" onclick="showTab('percent')">
            Percentage Suite
          </div>
          <div class="menu-item" onclick="showTab('gst')">GST Tax Suite</div>
        </nav>
        <div class="theme-box">
          <button id="themeSwitcher" onclick="toggleTheme()">
            ☀️ Light Mode
          </button>
        </div>
      </aside>

      <main class="workspace">
        <!-- Sections are inside standard workspace -->
        <div id="tab-standard" class="tab-content active">
          <div class="glass-card centered-calc">
            <div class="display">
              <div id="calc-history"></div>
              <input type="text" id="main-screen" readonly value="0" />
            </div>
            <div class="grid-keypad">
              <button class="k-btn k-alt" onclick="clearAll()">AC</button>
              <button class="k-btn k-alt" onclick="backspace()">DEL</button>
              <button class="k-btn k-op" onclick="mathOp('sqrt')">√</button>
              <button class="k-btn k-op" onclick="op('/')">÷</button>
              <button class="k-btn" onclick="num('7')">7</button>
              <button class="k-btn" onclick="num('8')">8</button>
              <button class="k-btn" onclick="num('9')">9</button>
              <button class="k-btn k-op" onclick="op('*')">×</button>
              <button class="k-btn" onclick="num('4')">4</button>
              <button class="k-btn" onclick="num('5')">5</button>
              <button class="k-btn" onclick="num('6')">6</button>
              <button class="k-btn k-op" onclick="op('-')">−</button>
              <button class="k-btn" onclick="num('1')">1</button>
              <button class="k-btn" onclick="num('2')">2</button>
              <button class="k-btn" onclick="num('3')">3</button>
              <button class="k-btn k-op" onclick="op('+')">+</button>
              <button class="k-btn k-zero" onclick="num('0')">0</button>
              <button class="k-btn" onclick="num('.')">.</button>
              <button class="k-btn k-eq" onclick="solve()">=</button>
            </div>
          </div>
        </div>

        <!-- Grocery Tool -->
        <div id="tab-market" class="tab-content">
          <div class="glass-card">
            <h3>Grocery Price Finder</h3>
            <input type="number" id="m-rate" placeholder="1kg Rate (₹)" />
            <input
              type="number"
              id="m-weight"
              placeholder="Weight in Grams (e.g. 240)"
            />
            <button class="p-btn" onclick="calcMarket()">Check Price</button>
            <div id="market-res" class="res-box">---</div>
            <div id="market-logic" class="logic-box"></div>
          </div>
        </div>

        <!-- Construction Tool -->
        <div id="tab-build" class="tab-content">
          <div class="glass-card">
            <h3>Roof / Wall Cost</h3>
            <div class="flex-row-inputs">
              <input type="number" id="b-len" placeholder="Len (Ft)" />
              <input type="number" id="b-wid" placeholder="Wid (Ft)" />
            </div>
            <input type="number" id="b-rate" placeholder="Rate (₹/SqFt)" />
            <button class="p-btn" onclick="calcBuild()">Find Cost</button>
            <div id="build-res" class="res-box">---</div>
            <div id="build-logic" class="logic-box"></div>
          </div>
        </div>

        <!-- Age & Date -->
        <div id="tab-age" class="tab-content">
          <div class="flex-row">
            <div class="glass-card">
              <h3>Your Age</h3>
              <input type="date" id="age-dob" />
              <button class="p-btn" onclick="calcAgeOnly()">Check Age</button>
              <div id="age-res" class="res-box">---</div>
            </div>
            <div class="glass-card">
              <h3>Date Gap</h3>
              <input type="date" id="date-start" /><input
                type="date"
                id="date-end"
              />
              <button class="p-btn btn-sec" onclick="calcDateGap()">Gap</button>
              <div id="gap-res" class="res-box">---</div>
            </div>
          </div>
        </div>

        <!-- Interest -->
        <div id="tab-interest" class="tab-content">
          <div class="glass-card">
            <h3>Interest Finder</h3>
            <input type="number" id="si-p" placeholder="Amount" />
            <input type="number" id="si-r" placeholder="Rate (%)" />
            <input type="number" id="si-t" placeholder="Time (Years)" />
            <button class="p-btn" onclick="calcSI()">Find SI</button>
            <div id="si-res" class="res-box">---</div>
          </div>
        </div>

        <!-- Profit -->
        <div id="tab-profit" class="tab-content">
          <div class="glass-card">
            <h3>Profit-Loss</h3>
            <input type="number" id="pl-cp" placeholder="CP" />
            <input type="number" id="pl-sp" placeholder="SP" />
            <button class="p-btn" onclick="calcPL()">Analyze</button>
            <div id="pl-res" class="res-box">---</div>
          </div>
        </div>

        <!-- Percent -->
        <div id="tab-percent" class="tab-content">
          <div class="glass-card">
            <h3>Percentage</h3>
            <input type="number" id="pr1-x" placeholder="Percentage (%)" />
            <input type="number" id="pr1-y" placeholder="Value" />
            <button class="p-btn" onclick="calcPr1()">Check</button>
            <div id="pr1-res" class="res-box">---</div>
          </div>
        </div>

        <!-- GST -->
        <div id="tab-gst" class="tab-content">
          <div class="glass-card">
            <h3>GST Calculator</h3>
            <input type="number" id="gst-add-amt" placeholder="Amount" />
            <select id="gst-add-rate">
              <option value="18">18%</option>
              <option value="12">12%</option>
            </select>
            <button class="p-btn" onclick="calcGSTAdd()">Add GST</button>
            <div id="gst-add-res" class="res-box">---</div>
          </div>
        </div>
      </main>
    </div>
    <script src="script.js"></script>
  </body>
</html>
